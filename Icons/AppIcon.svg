<?xml version="1.0" encoding="UTF-8"?>
<!--
  CopyCat app icon — canonical source.
  Exported from design/copycat_pawprint/Pawprint Icon.html (TWEAK_DEFAULTS):
    mode=color, style=flat, arrangement=diagonal, padding=10, glow=false,
    showBackPaw=true, cornerRadius=22.5, accent=#c93126, accentDeep=#7A1F1A.

  Geometry (paw-icon.jsx PAW_GEOMETRY) is normalized to a 100×100 viewBox.
  Layout offsets fold in the auto-recenter step (combinedCenter) so both
  paws sit centered at (50,50) before any padding scale is applied.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
  <defs>
    <clipPath id="corner-clip">
      <rect x="0" y="0" width="100" height="100" rx="22.5" ry="22.5"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="100" height="100" rx="22.5" ry="22.5" fill="#0a0606"/>

  <g clip-path="url(#corner-clip)">
    <!-- padding=10 → padScale=0.9, translate(5,5) -->
    <g transform="translate(5 5) scale(0.9)">
      <!-- Back paw: diagonal layout (13,-13,rot 12,scale 0.62) + recenter (+13.279,+14.358) -->
      <g transform="translate(26.279 1.358) rotate(12 50 50) scale(0.62)" fill="#7A1F1A">
        <ellipse cx="50" cy="66" rx="22"  ry="19"/>
        <ellipse cx="26" cy="44" rx="7"   ry="8.5"/>
        <ellipse cx="41" cy="30" rx="7.6" ry="9.8"/>
        <ellipse cx="59" cy="28" rx="8"   ry="10.2"/>
        <ellipse cx="74" cy="40" rx="7.2" ry="9"/>
      </g>
      <!-- Front paw: diagonal layout (-9,9,rot -6,scale 0.78) + recenter -->
      <g transform="translate(4.279 23.358) rotate(-6 50 50) scale(0.78)" fill="#c93126">
        <ellipse cx="50" cy="66" rx="22"  ry="19"/>
        <ellipse cx="26" cy="44" rx="7"   ry="8.5"/>
        <ellipse cx="41" cy="30" rx="7.6" ry="9.8"/>
        <ellipse cx="59" cy="28" rx="8"   ry="10.2"/>
        <ellipse cx="74" cy="40" rx="7.2" ry="9"/>
      </g>
    </g>
  </g>
</svg>
