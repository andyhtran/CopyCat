<?xml version="1.0" encoding="UTF-8"?>
<!--
  CopyCat menu-bar icon — canonical source (template style).
  Exported from design/copycat_pawprint/Pawprint Icon.html:
    mode=mono-light, arrangement=diagonal, padding=0,
    outline=back, outlineWidth=3.5, transparent background.

  Loaded into NSImage with isTemplate=true, so the system tints it
  white-on-dark and black-on-light automatically.

  stroke-width=5.645 = 3.5 / 0.62 — the inner scale=0.62 divides the
  back-paw stroke down to 3.5 viewBox units when it's rasterized.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Back paw: outline only -->
  <g transform="translate(26.279 1.358) rotate(12 50 50) scale(0.62)"
     fill="none" stroke="#000000" stroke-width="5.645">
    <ellipse cx="50" cy="66" rx="22"  ry="19"/>
    <ellipse cx="26" cy="44" rx="7"   ry="8.5"/>
    <ellipse cx="41" cy="30" rx="7.6" ry="9.8"/>
    <ellipse cx="59" cy="28" rx="8"   ry="10.2"/>
    <ellipse cx="74" cy="40" rx="7.2" ry="9"/>
  </g>
  <!-- Front paw: solid fill -->
  <g transform="translate(4.279 23.358) rotate(-6 50 50) scale(0.78)" fill="#000000">
    <ellipse cx="50" cy="66" rx="22"  ry="19"/>
    <ellipse cx="26" cy="44" rx="7"   ry="8.5"/>
    <ellipse cx="41" cy="30" rx="7.6" ry="9.8"/>
    <ellipse cx="59" cy="28" rx="8"   ry="10.2"/>
    <ellipse cx="74" cy="40" rx="7.2" ry="9"/>
  </g>
</svg>
